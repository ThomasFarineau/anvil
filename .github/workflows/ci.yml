name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Build CLI bundle
        run: bun run build

  test:
    name: Tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun test

  rust:
    name: Rust backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Scaffold test project
        run: bun src/cli/index.ts create /tmp/ci-launcher --template vanilla-js

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: /tmp/ci-launcher/src-anvil

      - name: cargo check
        run: cargo check --manifest-path /tmp/ci-launcher/src-anvil/Cargo.toml

      - name: cargo clippy
        # Informational for now — style lints should not block merges
        continue-on-error: true
        run: cargo clippy --manifest-path /tmp/ci-launcher/src-anvil/Cargo.toml -- -D warnings
